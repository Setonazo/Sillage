const store = {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(key, val) {
    try {
      localStorage.setItem(key, JSON.stringify(val));
    } catch(e) { console.error("localStorage failed:", e); }
  },
};

@keyframes spin{to{transform:rotate(360deg)}}
/* analyst */
.analyst-section{margin-top:2rem;background:#fff;border:1px solid #dde2ea;border-radius:3px;padding:1.5rem 1.8rem}
.analyst-title{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:#3a3f4a;font-weight:400;margin-bottom:.2rem}
.analyst-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:#6b7280;margin-bottom:1rem}
.analyst-suggests{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1rem}
.analyst-sug{padding:.3rem .75rem;font-family:'Josefin Sans',sans-serif;font-size:.63rem;letter-spacing:.06em;font-weight:400;background:#eef1f6;border:1px solid #dde2ea;color:#6b7280;cursor:pointer;border-radius:2px;transition:all .16s;text-align:left}
.analyst-sug:hover{background:#dbeafe;border-color:#1e3a5f;color:#1e3a5f}
.analyst-input-row{display:flex;gap:.6rem;align-items:flex-end}
.analyst-ta{flex:1;background:#faf8f5;border:1px solid #b8c1cf;color:#1c1714;padding:.7rem .85rem;font-family:'Josefin Sans',sans-serif;font-size:.8rem;font-weight:400;outline:none;border-radius:2px;resize:none;transition:border-color .2s;line-height:1.5}
.analyst-ta:focus{border-color:#1e3a5f}
.analyst-ta::placeholder{color:#6b7280}
.analyst-send{width:40px;height:40px;background:#1e3a5f;border:none;color:#fff;font-size:1.1rem;cursor:pointer;border-radius:2px;transition:background .18s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.analyst-send:hover{background:#2c5282}
.analyst-send:disabled{background:#b8c1cf;cursor:not-allowed}
.analyst-result-inner{font-size:.82rem;line-height:1.7;color:#1c1714;margin-top:1rem;padding-top:1rem;border-top:1px solid #dde2ea}
.analyst-result-inner h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:#1c1714;margin:1rem 0 .35rem}
.analyst-result-inner h3:first-child{margin-top:0}
.analyst-result-inner p{margin-bottom:.55rem}
.analyst-result-inner ul{padding-left:1.1rem;margin-bottom:.6rem}
.analyst-result-inner ul li{margin-bottom:.2rem}
/* toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1c1714;color:#fff;padding:.65rem 1.3rem;font-family:'Josefin Sans',sans-serif;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;border-radius:3px;z-index:9999;pointer-events:none;opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:600px){.charts-row,.coll-charts-row{grid-template-columns:1fr}.chart-wide{grid-column:auto}.log-entry{grid-template-columns:70px 1fr auto auto}}

// ── LOCAL ANALYSIS ENGINE ─────────────────────────────────────────────────

function h3(t) { return `<h3>${t}</h3>`; }
function p(t)  { return `<p>${t}</p>`; }
function ul(items) { return `<ul>${items.map(i=>`<li>${i}</li>`).join("")}</ul>`; }
function bold(t) { return `<strong>${t}</strong>`; }

function runLocalAnalysis(q, log, collection) {
  const fragCount={};log.forEach(e=>{fragCount[e.frag]=(fragCount[e.frag]||0)+1;});
  const lastUsed={};log.forEach(e=>{if(!lastUsed[e.frag]||e.date>lastUsed[e.frag])lastUsed[e.frag]=e.date;});
  const monthCount={};log.forEach(e=>{const m=e.date.slice(0,7);monthCount[m]=(monthCount[m]||0)+1;});
  const months=Object.keys(monthCount).sort();
  const total=log.length||1;

  // Rotación últimos N días
  if (q.includes("rotaci") || q.includes("15 d") || q.includes("30 d") || q.includes("últimos")) {
    const days = q.includes("15")? 15 : q.includes("7")? 7 : q.includes("90")? 90 : 30;
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
    const cutStr=cutoff.toISOString().split("T")[0];
    const recent=log.filter(e=>e.date>=cutStr);
    const recFrags=new Set(recent.map(e=>e.frag));
    const recBrands={};recent.forEach(e=>{const b=e.frag.split(" – ")[0];recBrands[b]=(recBrands[b]||0)+1;});
    const topRecBrand=Object.entries(recBrands).sort((a,b)=>b[1]-a[1])[0];
    const notUsed=collection.filter(p=>!recFrags.has(fragKey(p)));
    const topRec=Object.entries(recFrags).slice(0,5);
    return h3(`Rotación — últimos ${days} días`)
      + p(`Has usado ${bold(recFrags.size+" fragancias distintas")} en ${bold(recent.length+" usos")} durante este período.`)
      + p(`Marca más activa: ${bold(topRecBrand?.[0]||"—")} con ${topRecBrand?.[1]||0} usos.`)
      + h3("Fragancias usadas")
      + ul([...recFrags].map(f=>`${f} — ${recent.filter(e=>e.frag===f).length} vez`))
      + h3(`Sin usar en estos ${days} días (${notUsed.length} fragancias)`)
      + ul(notUsed.slice(0,10).map(p=>`${fragKey(p)}${!lastUsed[fragKey(p)]?" — sin estrenar":` — último uso: ${fmtDate(lastUsed[fragKey(p)])}`}`))
      + (notUsed.length>10?p(`...y ${notUsed.length-10} más.`):"");
  }

  // Abandonados
  if (q.includes("abandon") || q.includes("olvidado") || q.includes("ignorado")) {
    const sorted=collection
      .map(p=>({key:fragKey(p),last:lastUsed[fragKey(p)]||null,cnt:fragCount[fragKey(p)]||0}))
      .filter(x=>x.cnt>0)
      .sort((a,b)=>a.last.localeCompare(b.last))
      .slice(0,8);
    return h3("Perfumes más abandonados")
      + p("Fragancias que has usado pero llevan más tiempo sin aparecer en tu registro:")
      + ul(sorted.map(x=>`${x.key} — último uso: ${fmtDate(x.last)} (${x.cnt} uso${x.cnt!==1?"s":""})`));
  }

  // Predicción top 10 fin de año
  if (q.includes("predic") || q.includes("final de año") || q.includes("10 ")) {
    // Weight recent months more heavily
    const now=new Date();
    const scores={};
    log.forEach(e=>{
      const d=new Date(e.date+"T12:00:00");
      const monthsAgo=(now-d)/(1000*60*60*24*30);
      const weight=Math.max(0.1, 1-(monthsAgo/12));
      scores[e.frag]=(scores[e.frag]||0)+weight;
    });
    const top=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const remaining=new Date(now.getFullYear(),11,31)-now;
    const remDays=Math.round(remaining/(1000*60*60*24));
    return h3("Predicción: top 10 a final de año")
      + p(`Basado en tu historial ponderado (los usos recientes tienen más peso). Quedan ${bold(remDays+" días")} para fin de año.`)
      + ul(top.map(([frag,score],i)=>{
          const avgPerMonth=((fragCount[frag]||0)/months.length).toFixed(1);
          return `${i+1}. ${bold(frag)} — media ${avgPerMonth} usos/mes`;
        }))
      + p("La ponderación favorece las fragancias con actividad reciente sobre las históricamente frecuentes.");
  }

  // Estacional
  if (q.includes("estacion") || q.includes("verano") || q.includes("invierno") || q.includes("patrón")) {
    const bySeason={primavera:[],verano:[],otoño:[],invierno:[]};
    log.forEach(e=>{
      const m=parseInt(e.date.slice(5,7));
      if(m>=3&&m<=5) bySeason.primavera.push(e.frag);
      else if(m>=6&&m<=8) bySeason.verano.push(e.frag);
      else if(m>=9&&m<=11) bySeason.otoño.push(e.frag);
      else bySeason.invierno.push(e.frag);
    });
    const topBySeason={};
    for (const [s,frags] of Object.entries(bySeason)) {
      const cnt={};frags.forEach(f=>{cnt[f]=(cnt[f]||0)+1;});
      topBySeason[s]=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([f,c])=>`${f.split(" – ")[1]||f} (${c})`);
    }
    const icons={primavera:"🌸",verano:"☀️",otoño:"🍂",invierno:"❄️"};
    return h3("Patrones estacionales de uso")
      + Object.entries(topBySeason).map(([s,tops])=>
          `<p>${icons[s]} <strong>${s.charAt(0).toUpperCase()+s.slice(1)}</strong> (${bySeason[s].length} usos): ${tops.join(", ")||"Sin datos"}</p>`
        ).join("")
      + h3("Observación")
      + p(`Tu temporada de mayor actividad es ${bold(Object.entries(bySeason).sort((a,b)=>b[1].length-a[1].length)[0][0])} con ${Object.entries(bySeason).sort((a,b)=>b[1].length-a[1].length)[0][1].length} usos registrados.`);
  }

  // Más atención / infrautilizados
  if (q.includes("atenci") || q.includes("infrautiliz") || q.includes("merec")) {
    const never=collection.filter(p=>!fragCount[fragKey(p)]);
    const rare=collection
      .map(p=>({key:fragKey(p),cnt:fragCount[fragKey(p)]||0,last:lastUsed[fragKey(p)]||null}))
      .filter(x=>x.cnt>0&&x.cnt<=2)
      .sort((a,b)=>a.cnt-b.cnt);
    return h3("Sin estrenar — merecen una oportunidad")
      + (never.length>0 ? ul(never.map(p=>fragKey(p))) : p("¡Tienes todas estrenadas!"))
      + h3("Muy poco usadas (1–2 veces)")
      + (rare.length>0 ? ul(rare.map(x=>`${x.key} — ${x.cnt} uso${x.cnt!==1?"s":""}, último: ${x.last?fmtDate(x.last):"—"}`)) : p("No hay fragancias con menos de 3 usos."));
  }

  // Default: resumen general
  const topFrags=Object.entries(fragCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const never=collection.filter(p=>!fragCount[fragKey(p)]).length;
  const lastMonth=months[months.length-1];
  return h3("Resumen de tu colección")
    + p(`${bold(log.length+" usos")} registrados con ${bold(new Set(log.map(e=>e.frag)).size+" fragancias distintas")} de ${collection.length} en colección. ${bold(never)} sin estrenar.`)
    + h3("Tus 5 más usadas")
    + ul(topFrags.map(([f,c])=>`${f} — ${c} usos`))
    + h3("Mes más reciente registrado")
    + p(`${lastMonth||"—"}: ${monthCount[lastMonth]||0} usos.`)
    + p("Prueba a preguntar: <em>rotación últimos 15 días</em>, <em>predicción a final de año</em>, <em>patrones estacionales</em>, <em>perfumes abandonados</em>, o <em>qué merece más atención</em>.");
}

function analyzeCompraGeneral(collection, log, fragCount, lastUsed, famCount, collFamCount, topFamByUse, missingFams, totalUses) {
  const neverUsed=collection.filter(p=>!fragCount[fragKey(p)]);
  const overrepFam=Object.entries(collFamCount).sort((a,b)=>b[1]-a[1])[0];
  const underrepFam=missingFams[0]||null;

  // Gap analysis
  const seasonCount={Calor:0,"Todo el año":0,Frío:0};
  collection.forEach(p=>{const k=fragKey(p);seasonCount[SEASON_MAP[k]||"Todo el año"]++;});
  const minSeason=Object.entries(seasonCount).sort((a,b)=>a[1]-b[1])[0];

  const occCount={"Toda ocasión":0,Formal:0,Casual:0};
  collection.forEach(p=>{const k=fragKey(p);occCount[OCCASION_MAP[k]||"Toda ocasión"]++;});
  const minOcc=Object.entries(occCount).sort((a,b)=>a[1]-b[1])[0];

  return h3("Análisis de huecos en tu colección")
    + p(`Tienes ${bold(collection.length+" fragancias")}, de las cuales ${bold(neverUsed.length)} nunca has estrenado. Antes de comprar, considera si realmente necesitas una nueva.`)
    + h3("Familia más usada vs colección")
    + p(`Tu familia más usada es ${bold(topFamByUse)} (${Math.round((famCount[topFamByUse]||0)/totalUses*100)}% de tus usos), y también es la más representada en tu colección (${collFamCount[topFamByUse]||0} fragancias).`)
    + (underrepFam ? p(`Hueco detectado: tienes ${bold("poca representación")} de la familia ${bold(underrepFam)}. Una fragancia de esta familia aportaría variedad real.`) : "")
    + h3("Cobertura por estación / ocasión")
    + p(`La estación menos cubierta es ${bold(minSeason[0])} con solo ${minSeason[1]} fragancias. La ocasión menos cubierta es ${bold(minOcc[0])} con ${minOcc[1]}.`)
    + h3("Recomendación")
    + ul([
        underrepFam ? `Busca algo de familia ${bold(underrepFam)} — cubre un hueco real en tu rotación` : `Tu colección está bien equilibrada por familias`,
        `Estación más débil: ${bold(minSeason[0])} — considera una fragancia específica para esa época`,
        neverUsed.length>3 ? `Tienes ${neverUsed.length} fragancias sin estrenar — pruébalas antes de comprar` : `Has estrenado casi todo, tienes buen criterio de uso`,
      ]);
}

function analyzeCompraEspecifico(name, collection, log, fragCount, collFamCount, topFamByUse) {
  const nameLower=name.toLowerCase();
  // Try to find in FAMILY_MAP by partial match
  const matchKey=Object.keys(FAMILY_MAP).find(k=>k.toLowerCase().includes(nameLower)||nameLower.includes(k.toLowerCase().split(" – ")[1]||""));
  const fam=matchKey?FAMILY_MAP[matchKey]:"desconocida";
  const famInColl=collFamCount[fam]||0;
  const totalInColl=collection.length;

  // Check if already owned
  const alreadyOwned=collection.some(p=>fragKey(p).toLowerCase().includes(nameLower));

  const season=matchKey?SEASON_MAP[matchKey]||"Todo el año":"desconocida";
  const occ=matchKey?OCCASION_MAP[matchKey]||"Toda ocasión":"desconocida";

  // Similar frags already owned
  const similar=matchKey ? collection.filter(p=>{
    const k=fragKey(p);
    return FAMILY_MAP[k]===fam && k!==matchKey;
  }) : [];

  const verdict = alreadyOwned ? "⚠️ Ya la tienes" :
    similar.length>=4 ? "🟡 No prioritario" :
    similar.length>=2 ? "🟢 Compra opcional" : "✅ Compra recomendada";

  return h3(`Evaluación: ${name}`)
    + p(`${bold("Familia:")} ${fam} · ${bold("Estación:")} ${season} · ${bold("Ocasión:")} ${occ}`)
    + (alreadyOwned ? p(`⚠️ Ya tienes esta fragancia o una muy similar en tu colección.`) : "")
    + h3("Encaje en tu colección")
    + p(`Ya tienes ${bold(famInColl+" fragancias")} de familia ${fam} sobre ${totalInColl} en total (${Math.round(famInColl/totalInColl*100)}%).`)
    + (similar.length>0 ? p(`Fragancias similares que ya posees: ${similar.map(p=>p.name).join(", ")}.`) : p("No tienes fragancias de esta familia — cubriría un hueco."))
    + h3(`Veredicto: ${verdict}`)
    + p(alreadyOwned ? "Revisa si realmente necesitas duplicar esta fragancia." :
       similar.length>=4 ? "Tienes mucha representación de esta familia. Solo compra si te enamora especialmente." :
       similar.length>=2 ? "Tienes algo similar pero no es redundante. Evalúa si el precio lo justifica." :
       "Esta familia está poco representada en tu colección. Buen momento para incorporarla.");
}

function analyzeVentaGeneral(collection, log, fragCount, lastUsed, collFamCount) {
  const now=todayStr();
  const d90=new Date();d90.setDate(d90.getDate()-90);const d90s=d90.toISOString().split("T")[0];
  const d180=new Date();d180.setDate(d180.getDate()-180);const d180s=d180.toISOString().split("T")[0];

  // Candidates: never used, or used <2 times, or last used >180 days
  const candidates=collection.map(p=>{
    const key=fragKey(p);
    const cnt=fragCount[key]||0;
    const last=lastUsed[key]||null;
    let score=0; const reasons=[];
    if(!cnt){score+=3;reasons.push("nunca estrenado");}
    if(cnt===1){score+=2;reasons.push("usado solo 1 vez");}
    if(last&&last<d180s){score+=2;reasons.push(`sin usar desde ${fmtDate(last)}`);}
    else if(last&&last<d90s){score+=1;reasons.push(`más de 90 días sin usar`);}
    // Overrepresented family
    const fam=FAMILY_MAP[key]||"Otra";
    if((collFamCount[fam]||0)>=5){score+=1;reasons.push(`familia ${fam} muy representada (${collFamCount[fam]} frags)`);}
    return{key,cnt,last,score,reasons,fam};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,6);

  if(candidates.length===0) return h3("No hay candidatos claros a venta") + p("Tu colección está bien aprovechada. Ninguna fragancia destaca como candidata obvia a salir.");

  return h3("Candidatos a salir de la colección")
    + p("Ordenados por prioridad según uso real, tiempo sin usar y solapamiento de familia:")
    + candidates.map((c,i)=>
        `<p><strong>${i+1}. ${c.key}</strong><br/><span style="font-size:.8rem;color:#6b7280">${c.reasons.join(" · ")}</span></p>`
      ).join("")
    + h3("Consideración")
    + p("Antes de vender, prueba la fragancia durante una semana. A veces el desapego se convierte en redescubrimiento.");
}

function analyzeVentaEspecifico(name, collection, log, fragCount, lastUsed) {
  const nameLower=name.toLowerCase();
  const match=collection.find(p=>fragKey(p).toLowerCase().includes(nameLower)||p.name.toLowerCase().includes(nameLower));
  const key=match?fragKey(match):name;
  const cnt=fragCount[key]||0;
  const last=lastUsed[key]||null;
  const fam=FAMILY_MAP[key]||null;

  const d90=new Date();d90.setDate(d90.getDate()-90);
  const isAbandoned=last&&new Date(last)<d90;
  const neverUsed=cnt===0;

  // How many similar in collection?
  const similar=fam?collection.filter(p=>{const k=fragKey(p);return FAMILY_MAP[k]===fam&&k!==key;}):[];

  const verdict = neverUsed ? "🟡 Valora venderlo" :
    (isAbandoned && similar.length>=2) ? "✅ Vende" :
    isAbandoned ? "🟡 Valora venderlo" :
    cnt>=5 ? "❌ Quédate con él" : "🟡 Valora venderlo";

  return h3(`Evaluación: vender ${name}`)
    + p(`${bold("Familia:")} ${fam||"desconocida"} · ${bold("Usos totales:")} ${cnt} · ${bold("Último uso:")} ${last?fmtDate(last):"nunca"}`)
    + h3("Análisis")
    + ul([
        neverUsed ? "Nunca lo has estrenado — puede que no sea para ti" : `Lo has usado ${cnt} vez${cnt!==1?"es":""}`,
        last ? (isAbandoned ? `Lleva más de 90 días sin aparecer en tu registro — señal de desinterés` : `Lo has usado recientemente — probablemente lo sigues disfrutando`) : "Sin historial de uso",
        similar.length>0 ? `Tienes ${similar.length} fragancia${similar.length>1?"s":""} similar${similar.length>1?"es":""} de la misma familia: ${similar.slice(0,3).map(p=>p.name).join(", ")}` : "Es tu única fragancia de esta familia — saldrías sin sustituto",
      ])
    + h3(`Veredicto: ${verdict}`)
    + p(verdict.includes("Vende") ? "Los datos apuntan a que no lo estás aprovechando y tienes alternativas. Buen candidato a venta." :
       verdict.includes("Valora") ? "Hay indicios de poco uso pero no es concluyente. Pruébalo conscientemente esta semana antes de decidir." :
       "Lo usas con frecuencia y sin sustituto claro. No hay razón objetiva para venderlo.");
}

// ── MAIN APP ──────────────────────────────────────────────────────────────
function App() {
  const [ready, setReady] = useState(false);
  const [tab, setTab] = useState("hoy");
  const [log, setLog] = useState([]);
  const [collection, setCollection] = useState([]);
  const [fichas, setFichas] = useState({});
  const [cats, setCats] = useState({});
  const [sensaciones, setSensaciones] = useState({}); // { logId: { proyeccion, duracion, nota } }
  const [rotDays, setRotDays] = useState(30); // alert threshold
  const [toast, setToast] = useState("");
  const [toastVisible, setToastVisible] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const toastTimer = useRef(null);
  const saveTimer = useRef(null);

  // Load all data on mount
  useEffect(() => {
    (async () => {
      const [savedLog, savedColl, savedFichas, savedCats, seeded, savedSens, savedRotDays] = await Promise.all([
        store.get(SK.log), store.get(SK.coll), store.get(SK.fichas), store.get(SK.cats),
        store.get(SK.seeded), store.get("sillage-sens"), store.get("sillage-rotdays"),
      ]);
      const initialLog = savedLog || HISTORY_RAW.map(([date,frag,session]) => ({
        id: `${date}_${session}_${frag}`, date, frag, session
      }));
      const initialColl = savedColl || COLLECTION_DEFAULT.map(p=>({brand:p.brand,name:p.name}));
      setLog(initialLog);
      setCollection(initialColl);
      setFichas(savedFichas || {});
      setCats(savedCats || {});
      setSensaciones(savedSens || {});
      if (savedRotDays !== null) setRotDays(savedRotDays);
      // Only write defaults if never seeded before
      if (!seeded) {
        await Promise.all([
          store.set(SK.log, initialLog),
          store.set(SK.coll, initialColl),
          store.set(SK.fichas, savedFichas || {}),
          store.set(SK.cats, savedCats || {}),
          store.set(SK.seeded, true),
        ]);
      }
      setReady(true);
    })();
  }, []);

  const showSaveStatus = useCallback(() => {
    setSaveStatus("guardando...");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => setSaveStatus("✓ guardado"), 600);
    setTimeout(() => setSaveStatus(""), 3000);
  }, []);

  const showToast = useCallback((msg) => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast(msg); setToastVisible(true);
    toastTimer.current = setTimeout(() => setToastVisible(false), 2400);
  }, []);

  const saveLog = useCallback(async (newLog) => {
    setLog(newLog);
    showSaveStatus();
    await store.set(SK.log, newLog);
  }, [showSaveStatus]);

  const saveColl = useCallback(async (newColl) => {
    setCollection(newColl);
    showSaveStatus();
    await store.set(SK.coll, newColl);
  }, [showSaveStatus]);

  const saveFichas = useCallback(async (newFichas) => {
    setFichas(newFichas);
    showSaveStatus();
    await store.set(SK.fichas, newFichas);
  }, [showSaveStatus]);

  const saveCats = useCallback(async (newCats) => {
    setCats(newCats);
    showSaveStatus();
    await store.set(SK.cats, newCats);
  }, [showSaveStatus]);

  const saveSensaciones = useCallback(async (newSens) => {
    setSensaciones(newSens);
    showSaveStatus();
    await store.set("sillage-sens", newSens);
  }, [showSaveStatus]);

  const saveRotDays = useCallback(async (days) => {
    setRotDays(days);
    await store.set("sillage-rotdays", days);
  }, []);

  const getSeason = (key) => (cats[key]?.season) || SEASON_MAP[key] || "Todo el año";
  const getOccasion = (key) => (cats[key]?.occasion) || OCCASION_MAP[key] || "Toda ocasión";

  if (!ready) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Josefin Sans',sans-serif",fontSize:".7rem",letterSpacing:".2em",color:"#6b7280",textTransform:"uppercase",background:"#faf8f5"}}>
      Cargando...
    </div>
  );

  const TABS = ["hoy","registro","estadisticas","coleccion","recomendador","comparador"];
  const TAB_LABELS = {hoy:"Hoy",registro:"Registro",estadisticas:"Estadísticas",coleccion:"Colección",recomendador:"Recomendador",comparador:"Comparador"};

  const exportData = () => {
    const data = { log, collection, fichas, cats, sensaciones, rotDays, exportedAt: todayStr() };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `sillage-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Backup exportado ✦");
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.log) { setLog(data.log); await store.set(SK.log, data.log); }
        if (data.collection) { setCollection(data.collection); await store.set(SK.coll, data.collection); }
        if (data.fichas) { setFichas(data.fichas); await store.set(SK.fichas, data.fichas); }
        if (data.cats) { setCats(data.cats); await store.set(SK.cats, data.cats); }
        if (data.sensaciones) { setSensaciones(data.sensaciones); await store.set("sillage-sens", data.sensaciones); }
        if (data.rotDays) { setRotDays(data.rotDays); await store.set("sillage-rotdays", data.rotDays); }
        showToast("Backup restaurado ✦");
      } catch { showToast("Error al leer el archivo"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div className="sil">
      <style>{CSS}</style>
      <div className="sil-wrap">
        <header className="sil-header">
          <div className="sil-brand">Sillage</div>
          <div className="sil-tagline">Diario personal de fragancias</div>
          {saveStatus && <div style={{fontSize:".55rem",letterSpacing:".15em",textTransform:"uppercase",color:saveStatus.startsWith("✓")?"#1e3a5f":"#9ca3af",marginTop:".3rem"}}>{saveStatus}</div>}
          <div style={{display:"flex",justifyContent:"center",gap:".5rem",marginTop:".8rem"}}>
            <button onClick={exportData} style={{padding:".3rem .9rem",fontFamily:"'Josefin Sans',sans-serif",fontSize:".58rem",letterSpacing:".14em",textTransform:"uppercase",background:"transparent",border:"1px solid #b8c1cf",color:"#6b7280",cursor:"pointer",borderRadius:2}}>
              ↓ Exportar backup
            </button>
            <label style={{padding:".3rem .9rem",fontFamily:"'Josefin Sans',sans-serif",fontSize:".58rem",letterSpacing:".14em",textTransform:"uppercase",background:"transparent",border:"1px solid #b8c1cf",color:"#6b7280",cursor:"pointer",borderRadius:2}}>
              ↑ Importar backup
              <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
            </label>
          </div>
        </header>
        <div className="sil-tabs">
          {TABS.map(t => <button key={t} className={`sil-tab${tab===t?" active":""}`} onClick={()=>setTab(t)}>{TAB_LABELS[t]}</button>)}
        </div>
        <div className="sil-panel">
          {tab==="hoy" && <TabHoy log={log} collection={collection} saveLog={saveLog} sensaciones={sensaciones} saveSensaciones={saveSensaciones} rotDays={rotDays} saveRotDays={saveRotDays} showToast={showToast}/>}
          {tab==="registro" && <TabRegistro log={log} saveLog={saveLog} sensaciones={sensaciones} showToast={showToast}/>}
          {tab==="estadisticas" && <TabStats log={log} collection={collection}/>}
          {tab==="coleccion" && <TabColeccion log={log} collection={collection} fichas={fichas} cats={cats} saveColl={saveColl} saveFichas={saveFichas} saveCats={saveCats} getSeason={getSeason} getOccasion={getOccasion} showToast={showToast}/>}
          {tab==="recomendador" && <TabRecomendador log={log} collection={collection}/>}
          {tab==="comparador" && <TabComparador log={log} collection={collection} fichas={fichas} cats={cats} sensaciones={sensaciones} getSeason={getSeason} getOccasion={getOccasion}/>}
        </div>
      </div>
      <div className={`toast${toastVisible?" show":""}`}>{toast}</div>
    </div>
  );
}

  const dt = new Date(selDate+"T12:00:00");
  const dateLabel = `${DAYS_ES[dt.getDay()]}, ${dt.getDate()} de ${MONTHS_ES[dt.getMonth()]} de ${dt.getFullYear()}`;
  const isToday = selDate === todayStr();
  const dayEntries = log.filter(e=>e.date===selDate);

  const filtered = search
    ? collection.filter(p=>(p.brand+" "+p.name).toLowerCase().includes(search.toLowerCase()))
    : collection;

  // Rotation alerts
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - rotDays);
  const cutoffStr = cutoff.toISOString().split("T")[0];
  const lastUsedMap = {};
  log.forEach(e=>{if(!lastUsedMap[e.frag]||e.date>lastUsedMap[e.frag])lastUsedMap[e.frag]=e.date;});
  const sleeping = collection
    .map(p=>({p, key:fragKey(p), last:lastUsedMap[fragKey(p)]||null}))
    .filter(({last})=>!last||last<cutoffStr)
    .sort((a,b)=>{
      if(!a.last&&!b.last)return 0;
      if(!a.last)return -1;
      if(!b.last)return 1;
      return a.last.localeCompare(b.last);

    const existing = log.find(e=>e.date===selDate&&e.session===session);

      newLog = log.map(e=>e.id===existing.id?{...e,frag}:e);

            <div className="modal-title-text" style={{marginBottom:"1.2rem"}}>{sensModal.frag.split(" – ")[1]||sensModal.frag}</div>

            <div className="sec-label" style={{marginTop:0}}>Proyección</div>
            <div className="cat-btn-row" style={{marginBottom:"1rem"}}>
              {PROY.map(p=><button key={p} className={`cat-btn${sensForm.proyeccion===p?" active":""}`}
                style={sensForm.proyeccion===p?{background:"#1e3a5f",borderColor:"#1e3a5f",color:"#fff"}:{}}
                onClick={()=>setSensForm(f=>({...f,proyeccion:p}))}>{p}</button>)}
            </div>

            <div className="sec-label" style={{marginTop:0}}>Duración</div>
            <div className="cat-btn-row" style={{marginBottom:"1rem"}}>
              {DUR.map(d=><button key={d} className={`cat-btn${sensForm.duracion===d?" active":""}`}
                style={sensForm.duracion===d?{background:"#1e3a5f",borderColor:"#1e3a5f",color:"#fff"}:{}}
                onClick={()=>setSensForm(f=>({...f,duracion:d}))}>{d}</button>)}
            </div>

            <div className="sec-label" style={{marginTop:0}}>Nota libre</div>
            <textarea className="modal-textarea" value={sensForm.nota}
              onChange={e=>setSensForm(f=>({...f,nota:e.target.value}))}
              placeholder="¿Cómo te ha sentado hoy? ¿Algo que destacar del batch, proyección, longevidad...?"/>

            <div className="modal-btn-row">
              <button className="btn btn-primary" onClick={saveSens}>Guardar sensaciones</button>
              <button className="btn btn-secondary" onClick={()=>setSensModal(null)}>Omitir</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── TAB: REGISTRO ─────────────────────────────────────────────────────────
function TabRegistro({log, saveLog, sensaciones, showToast}) {
  const sorted = [...log].sort((a,b)=>b.date.localeCompare(a.date)||a.session.localeCompare(b.session));

  const del = async (id) => {
    const newLog = log.filter(e=>e.id!==id);
    await saveLog(newLog);
    showToast("Entrada eliminada");
  };

  return (
    <div>
      <div className="sec-label" style={{marginTop:0}}>Historial completo</div>
      {sorted.length===0 && <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",color:"#6b7280",padding:"2rem 0"}}>No hay entradas aún.</div>}
      {sorted.map(e=>{
        const s = sensaciones[e.id];
        return (
          <div key={e.id} style={{marginBottom:".35rem"}}>
            <div className="log-entry">
              <div className="log-date">{fmtDate(e.date)}</div>
              <div className="log-frag">{e.frag}</div>
              <div><span className="badge">{e.session}</span></div>
              <button className="log-del" onClick={()=>del(e.id)}>✕</button>
            </div>
            {s && (s.proyeccion||s.duracion||s.nota) && (
              <div style={{background:"#f8fafc",border:"1px solid #dde2ea",borderTop:"none",borderRadius:"0 0 3px 3px",padding:".4rem .9rem",display:"flex",gap:".8rem",flexWrap:"wrap",alignItems:"center"}}>
                {s.proyeccion && <span style={{fontSize:".62rem",color:"#3a3f4a"}}><span style={{color:"#6b7280"}}>Proy:</span> {s.proyeccion}</span>}
                {s.duracion  && <span style={{fontSize:".62rem",color:"#3a3f4a"}}><span style={{color:"#6b7280"}}>Dur:</span> {s.duracion}</span>}
                {s.nota      && <span style={{fontSize:".68rem",fontStyle:"italic",color:"#3a3f4a",fontFamily:"'Cormorant Garamond',serif"}}>"{s.nota}"</span>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── TAB: ESTADÍSTICAS ─────────────────────────────────────────────────────
function TabStats({log, collection}) {
  const [analystQuery, setAnalystQuery] = useState("");
  const [analystResult, setAnalystResult] = useState("");
  const [analystLoading, setAnalystLoading] = useState(false);

  const total = log.length;
  const uniqueFrags = new Set(log.map(e=>e.frag)).size;
  const unused = collection.filter(p=>!log.some(e=>e.frag===fragKey(p))).length;
  const dayMap = {}; log.forEach(e=>{dayMap[e.date]=(dayMap[e.date]||0)+1;});
  const multiDays = Object.values(dayMap).filter(v=>v>1).length;
  const brandCount = {}; log.forEach(e=>{const b=e.frag.split(" – ")[0];brandCount[b]=(brandCount[b]||0)+1;});
  const topBrand = Object.entries(brandCount).sort((a,b)=>b[1]-a[1])[0]||["—",0];

  // Streak
  const dates = [...new Set(log.map(e=>e.date))].sort().reverse();
  let streak=0, check=todayStr();
  for (const d of dates) {
    if(d===check){streak++;const dt=new Date(check+"T12:00:00");dt.setDate(dt.getDate()-1);check=dt.toISOString().split("T")[0];}else break;
  }

  // Brand chart top 8
  const topBrands = Object.entries(brandCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxB = topBrands[0]?.[1]||1;
  const palette=["#1e3a5f","#2c5282","#3b6cb7","#5585c8","#7aa4d8","#9fbfe5","#c4d9f0","#ddeaf8"];

  // Families donut
  const famCount = {}; log.forEach(e=>{const f=FAMILY_MAP[e.frag]||"Otra";famCount[f]=(famCount[f]||0)+1;});
  const famEntries = Object.entries(famCount).sort((a,b)=>b[1]-a[1]);
  const R=54,cx=70,cy=70,stroke=20,circ=2*Math.PI*R;
  let offset=0;
  const donutSegs = famEntries.map(([fam,cnt])=>{
    const pct=cnt/total; const dash=pct*circ;
    const seg={fam,cnt,dash,offset};offset+=dash;return seg;
  });

  // Monthly bars
  const monthCount={}; log.forEach(e=>{const m=e.date.slice(0,7);monthCount[m]=(monthCount[m]||0)+1;});
  const months=Object.keys(monthCount).sort();
  const maxM=Math.max(...Object.values(monthCount),1);
  const monthNames={1:"Ene",2:"Feb",3:"Mar",4:"Abr",5:"May",6:"Jun",7:"Jul",8:"Ago",9:"Sep",10:"Oct",11:"Nov",12:"Dic"};

  // Sessions
  const sesCount={"día":0,"tarde":0,"noche":0};
  log.forEach(e=>{const s=e.session==="mañana"?"día":e.session;sesCount[s]=(sesCount[s]||0)+1;});
  const sesEntries=Object.entries(sesCount).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const maxS=sesEntries[0]?.[1]||1;

  // Rotation
  const d30=new Date(),d90=new Date(),d180=new Date();
  d30.setDate(d30.getDate()-30);d90.setDate(d90.getDate()-90);d180.setDate(d180.getDate()-180);
  const [s30,s90,s180]=[d30,d90,d180].map(d=>d.toISOString().split("T")[0]);
  const rot=[
    {label:"30 días",count:new Set(log.filter(e=>e.date>=s30).map(e=>e.frag)).size},
    {label:"90 días",count:new Set(log.filter(e=>e.date>=s90).map(e=>e.frag)).size},
    {label:"180 días",count:new Set(log.filter(e=>e.date>=s180).map(e=>e.frag)).size},
  ];
  const maxR=rot[0].count||1;

  // Top 15
  const fragCount={}; log.forEach(e=>{fragCount[e.frag]=(fragCount[e.frag]||0)+1;});
  const top15=Object.entries(fragCount).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const maxF=top15[0]?.[1]||1;

  // Analyst
  const SUGGESTIONS=["Evalúa la rotación de los últimos 15 días","¿Qué perfume he abandonado más recientemente?","Predice mis 10 más usados a final de año","¿Hay algún patrón estacional en mis elecciones?","¿Qué perfumes merecen más atención?"];

  const sendAnalyst = () => {
    if (!analystQuery.trim()) return;
    setAnalystLoading(true); setAnalystResult("");
    setTimeout(() => {
      try {
        const result = runLocalAnalysis(analystQuery.trim().toLowerCase(), log, collection);
        setAnalystResult(result);
      } catch(e) {
        setAnalystResult("<p style='color:#c0503a'>Error al procesar la consulta.</p>");
      }
      setAnalystLoading(false);
    }, 400);
  };

  return (
    <div>
      <div className="stats-grid">
        {[
          {label:"Usos registrados",val:total,sub:`${multiDays} días con 2+ fragancias`},
          {label:"Fragancias distintas usadas",val:uniqueFrags,sub:`de ${collection.length} · ${unused} sin estrenar`},
          {label:"Racha actual",val:`🕯 ${streak}`,sub:"días consecutivos"},
          {label:"Marca favorita",val:topBrand[0],sub:`${topBrand[1]} usos`,small:true},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={s.small?{fontSize:"1.3rem"}:{}}>{s.val}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="charts-row">
        <div className="chart-card">
          <div className="chart-title">Top marcas por usos</div>
          {topBrands.map(([brand,cnt],i)=>(
            <div key={brand} className="bar-row">
              <div className="bar-label" title={brand}>{brand}</div>
              <div className="bar-track"><div className="bar-fill" style={{width:`${cnt/maxB*100}%`,background:palette[i]}}/></div>
              <div className="bar-val">{cnt}</div>
            </div>
          ))}
        </div>
        <div className="chart-card">
          <div className="chart-title">Familias olfativas</div>
          <div className="donut-wrap">
            <svg width="140" height="140" viewBox="0 0 140 140" style={{flexShrink:0}}>
              <circle cx={cx} cy={cy} r={R} fill="none" stroke="#eef1f6" strokeWidth={stroke}/>
              {donutSegs.map(s=>(
                <circle key={s.fam} cx={cx} cy={cy} r={R} fill="none"
                  stroke={C.fam[s.fam]||C.fam.Otra} strokeWidth={stroke}
                  strokeDasharray={`${s.dash.toFixed(2)} ${(circ-s.dash).toFixed(2)}`}
                  strokeDashoffset={(-(s.offset)+circ/4).toFixed(2)}
                  transform={`rotate(-90,${cx},${cy})`}/>
              ))}
            </svg>
            <div className="legend">
              {famEntries.map(([fam,cnt])=>(
                <div key={fam} className="legend-item">
                  <div className="legend-dot" style={{background:C.fam[fam]||C.fam.Otra}}/>
                  <span>{fam}</span>
                  <span className="legend-pct">{Math.round(cnt/total*100)}%</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="charts-row">
        <div className="chart-card chart-wide">
          <div className="chart-title">Usos por mes</div>
          <div style={{overflowX:"auto"}}>
            <svg viewBox={`0 0 ${Math.max(600,months.length*42)} 120`} style={{minWidth:Math.max(600,months.length*42),width:"100%",display:"block"}}>
              {months.map((m,i)=>{
                const v=monthCount[m]; const W=Math.max(600,months.length*42);
                const step=(W-60)/months.length; const bw=Math.min(28,step-6);
                const x=30+i*step+step/2-bw/2; const bh=(v/maxM)*90; const y=100-bh;
                const [yr,mo]=m.split("-");
                return (
                  <g key={m}>
                    <rect x={x} y={y} width={bw} height={bh} rx="2" fill="#1e3a5f" opacity=".8"/>
                    <text x={x+bw/2} y="115" textAnchor="middle" fontSize="8" fill="#6b7280" fontFamily="'Josefin Sans',sans-serif">{monthNames[parseInt(mo)]} {yr.slice(2)}</text>
                    <text x={x+bw/2} y={y-4} textAnchor="middle" fontSize="8" fill="#3a3f4a" fontFamily="'Josefin Sans',sans-serif">{v}</text>
                  </g>
                );
              })}
            </svg>
          </div>
        </div>
      </div>

      <div className="charts-row">
        <div className="chart-card">
          <div className="chart-title">Momento del día</div>
          {sesEntries.map(([ses,cnt],i)=>(
            <div key={ses} className="bar-row">
              <div className="bar-label" style={{textTransform:"capitalize"}}>{ses}</div>
              <div className="bar-track"><div className="bar-fill" style={{width:`${cnt/maxS*100}%`,background:palette[i]}}/></div>
              <div className="bar-val">{Math.round(cnt/total*100)}%</div>
            </div>
          ))}
        </div>
        <div className="chart-card">
          <div className="chart-title">Rotación de colección</div>
          <div style={{fontSize:".65rem",color:"#6b7280",marginBottom:".8rem",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic"}}>Fragancias distintas sobre {collection.length}</div>
          {rot.map(({label,count},i)=>(
            <div key={label} className="bar-row">
              <div className="bar-label">{label}</div>
              <div className="bar-track"><div className="bar-fill" style={{width:`${count/maxR*100}%`,background:palette[i]}}/></div>
              <div className="bar-val">{count}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="sec-label">Top 15 más usadas</div>
      {top15.map(([frag,cnt],i)=>{
        const [brand,...rest]=frag.split(" – ");
        return (
          <div key={frag} className="rank-item">
            <div className="rank-num">{i+1}</div>
            <div>
              <div className="rank-name">{rest.join(" – ")||frag}</div>
              <div className="rank-brand">{brand}</div>
              <div className="bar-wrap" style={{height:3,background:"#eef1f6",marginTop:4,borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${cnt/maxF*100}%`,background:"#2c5282",borderRadius:2}}/>
              </div>
            </div>
            <div className="rank-cnt">{cnt}×</div>
          </div>
        );
      })}

      <div className="analyst-section">
        <div className="analyst-title">Analista de datos</div>
        <div className="analyst-sub">Haz cualquier consulta sobre tu historial, tendencias o predicciones</div>
        <div className="analyst-suggests">
          {SUGGESTIONS.map(s=><button key={s} className="analyst-sug" onClick={()=>setAnalystQuery(s)}>{s}</button>)}
        </div>
        <div className="analyst-input-row">
          <textarea className="analyst-ta" rows={2} value={analystQuery} onChange={e=>setAnalystQuery(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAnalyst();}}}
            placeholder="Escribe tu consulta aquí..."/>
          <button className="analyst-send" onClick={sendAnalyst} disabled={analystLoading}>→</button>
        </div>
        {analystLoading && <div className="ai-loading"><div className="spinner"/><span>Analizando tus datos...</span></div>}
        {analystResult && <div className="analyst-result-inner" dangerouslySetInnerHTML={{__html:analystResult}}/>}
      </div>
    </div>
  );
}

// ── TAB: COLECCIÓN ────────────────────────────────────────────────────────
function TabColeccion({log, collection, fichas, cats, saveColl, saveFichas, saveCats, getSeason, getOccasion, showToast}) {
  const [brandFilter, setBrandFilter] = useState("Todos");
  const [modalKey, setModalKey] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [addBrand, setAddBrand] = useState("");
  const [addName, setAddName] = useState("");
  const [modalNotes, setModalNotes] = useState("");
  const [modalLink, setModalLink] = useState("");
  const [modalSeason, setModalSeason] = useState("");
  const [modalOccasion, setModalOccasion] = useState("");

  const today30 = new Date(); today30.setDate(today30.getDate()-30);
  const t30 = today30.toISOString().split("T")[0];

  const brands = ["Todos",...new Set(collection.map(p=>p.brand))].sort();
  const filtered = brandFilter==="Todos" ? collection : collection.filter(p=>p.brand===brandFilter);

  const usageCount = (key) => log.filter(e=>e.frag===key).length;
  const lastUsed = (key) => {
    const dates = log.filter(e=>e.frag===key).map(e=>e.date).sort();
    return dates[dates.length-1]||null;
  };

  const openFicha = (key) => {
    const f = fichas[key]||{};
    setModalNotes(f.notes||"");
    setModalLink(f.link||"");
    setModalSeason(getSeason(key));
    setModalOccasion(getOccasion(key));
    setModalKey(key);
  };

  const saveFicha = async () => {
    const newFichas = {...fichas,[modalKey]:{notes:modalNotes,link:modalLink}};
    const newCats = {...cats,[modalKey]:{season:modalSeason,occasion:modalOccasion}};
    await saveFichas(newFichas);
    await saveCats(newCats);
    setModalKey(null);
    showToast("Ficha guardada ✦");
  };

  const deleteFrag = async () => {
    if (!confirm(`¿Eliminar "${modalKey}" de la colección?`)) return;
    const [brand,...rest]=modalKey.split(" – ");
    const name=rest.join(" – ");
    await saveColl(collection.filter(p=>!(p.brand===brand&&p.name===name)));
    setModalKey(null);
    showToast("Fragancia eliminada");
  };

  const addFrag = async () => {
    if (!addBrand.trim()||!addName.trim()){showToast("Rellena marca y nombre");return;}
    const key=`${addBrand.trim()} – ${addName.trim()}`;
    if (collection.some(p=>fragKey(p)===key)){showToast("Ya está en la colección");return;}
    const newColl=[...collection,{brand:addBrand.trim(),name:addName.trim()}].sort((a,b)=>a.brand.localeCompare(b.brand)||a.name.localeCompare(b.name));
    await saveColl(newColl);
    setShowAdd(false);setAddBrand("");setAddName("");
    showToast(`${key} añadido ✦`);
  };

  // Ficha data
  const modalFrag = modalKey ? modalKey.split(" – ") : [];
  const modalBrand = modalFrag[0]||"";
  const modalName = modalFrag.slice(1).join(" – ")||"";
  const modalCount = modalKey ? usageCount(modalKey) : 0;
  const modalLast = modalKey ? lastUsed(modalKey) : null;
  const modalHistory = modalKey ? [...log].filter(e=>e.frag===modalKey).sort((a,b)=>b.date.localeCompare(a.date)) : [];
  const byMonth = {};
  modalHistory.forEach(e=>{const m=e.date.slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(e);});

  // Season/occasion charts
  const seasonOrder=["Calor","Todo el año","Frío"];
  const occOrder=["Toda ocasión","Formal","Casual"];
  const sBuckets={Calor:[],["Todo el año"]:[],Frío:[]};
  const oBuckets={["Toda ocasión"]:[],Formal:[],Casual:[]};
  collection.forEach(p=>{const key=fragKey(p);sBuckets[getSeason(key)].push(key);oBuckets[getOccasion(key)].push(key);});
  const sMax=Math.max(...Object.values(sBuckets).map(b=>b.length),1);
  const oMax=Math.max(...Object.values(oBuckets).map(b=>b.length),1);

  const updateCat = async (key,type,val) => {
    const newCats={...cats,[key]:{...cats[key],[type]:val}};
    await saveCats(newCats);
  };

  return (
    <div>
      <div className="coll-top">
        <div className="coll-filters">
          {brands.map(b=><button key={b} className={`filter-btn${brandFilter===b?" active":""}`} onClick={()=>setBrandFilter(b)}>{b}</button>)}
        </div>
        <button className="btn-add" onClick={()=>setShowAdd(true)}>+ Añadir</button>
      </div>

      <div className="coll-grid">
        {filtered.map(p=>{
          const key=fragKey(p);
          const cnt=usageCount(key);
          const last=lastUsed(key);
          const dots=Math.min(cnt,20);
          const recent=log.filter(e=>e.frag===key&&e.date>=t30).length;
          const old=Math.max(0,dots-recent);
          const f=fichas[key]||{};
          return (
            <div key={key} className="coll-card" onClick={()=>openFicha(key)}>
              <div className="coll-brand">{p.brand}</div>
              <div className="coll-name">{p.name}</div>
              {cnt>0
                ? <><div style={{fontSize:".65rem",color:"#6b7280"}}>{cnt} uso{cnt!==1?"s":""} · último {last?fmtDate(last):"—"}</div>
                    <div className="usage-dots">{Array(old).fill(0).map((_,i)=><span key={`o${i}`} className="dot used"/>)}{Array(Math.min(recent,dots)).fill(0).map((_,i)=><span key={`r${i}`} className="dot recent"/>)}</div></>
                : <div className="never-badge">Sin estrenar</div>
              }
              {f.notes&&<div className="notes-badge">· Notas ·</div>}
            </div>
          );
        })}
      </div>

      {/* Season / Occasion charts */}
      <div className="coll-charts-row">
        <CollChart title="Por estación" order={seasonOrder} buckets={sBuckets} maxV={sMax} colors={C.season} type="season" getSeason={getSeason} getOccasion={getOccasion} updateCat={updateCat} otherColors={C.occ} otherFn={getOccasion}/>
        <CollChart title="Por ocasión" order={occOrder} buckets={oBuckets} maxV={oMax} colors={C.occ} type="occasion" getSeason={getSeason} getOccasion={getOccasion} updateCat={updateCat} otherColors={C.season} otherFn={getSeason}/>
      </div>

      {/* Ficha modal */}
      {modalKey && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setModalKey(null);}}>
          <div className="modal-box">
            <button className="modal-close" onClick={()=>setModalKey(null)}>✕</button>
            <div className="modal-brand-label">{modalBrand}</div>
            <div className="modal-title-text">{modalName}</div>
            <div className="modal-stats-text">
              {modalCount>0?`${modalCount} uso${modalCount!==1?"s":""} · último: ${modalLast?fmtDate(modalLast):"—"}`:"Sin usos registrados aún"}
            </div>

            {/* History */}
            <div className="sec-label" style={{marginTop:0}}>Historial de usos</div>
            <div className="usage-history-wrap" style={{marginBottom:"1rem"}}>
              {modalHistory.length===0
                ? <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",color:"#6b7280",fontSize:".9rem"}}>Sin usos registrados.</div>
                : Object.keys(byMonth).sort().reverse().map(m=>{
                    const [y,mo]=m.split("-");
                    return (
                      <div key={m} className="usage-month">
                        <div className="usage-month-label">{MONTHS_ES[parseInt(mo)-1]} {y} <span className="usage-month-cnt">{byMonth[m].length}×</span></div>
                        <div className="usage-pills">{byMonth[m].map((e,i)=><span key={i} className="usage-pill">{fmtDate(e.date)}<span className="usage-pill-ses">{e.session}</span></span>)}</div>
                      </div>
                    );
                  })
              }
            </div>

            {/* Categories */}
            <div className="sec-label" style={{marginTop:0}}>Estación</div>
            <div className="cat-btn-row" style={{marginBottom:"1rem"}}>
              {seasonOrder.map(s=><button key={s} className={`cat-btn${modalSeason===s?" active":""}`} style={modalSeason===s?{background:C.season[s],borderColor:C.season[s]}:{}} onClick={()=>setModalSeason(s)}>{s}</button>)}
            </div>
            <div className="sec-label" style={{marginTop:0}}>Ocasión</div>
            <div className="cat-btn-row" style={{marginBottom:"1.2rem"}}>
              {occOrder.map(o=><button key={o} className={`cat-btn${modalOccasion===o?" active":""}`} style={modalOccasion===o?{background:C.occ[o],borderColor:C.occ[o]}:{}} onClick={()=>setModalOccasion(o)}>{o}</button>)}
            </div>

            {/* Link */}
            <div className="sec-label" style={{marginTop:0}}>Fragrantica</div>
            <div className="modal-link-row">
              <input className="modal-input" type="url" value={modalLink} onChange={e=>setModalLink(e.target.value)} placeholder="https://www.fragrantica.es/perfume/..."/>
              {modalLink.startsWith("http")&&<a className="btn-fragrantica" href={modalLink} target="_blank" rel="noopener">Abrir →</a>}
            </div>

            {/* Notes */}
            <div className="sec-label" style={{marginTop:0}}>Notas personales</div>
            <textarea className="modal-textarea" value={modalNotes} onChange={e=>setModalNotes(e.target.value)} placeholder="Batch, backup, impresiones..."/>

            <div className="modal-btn-row">
              <button className="btn btn-primary" onClick={saveFicha}>Guardar</button>
              <button className="btn btn-danger" onClick={deleteFrag}>Eliminar de la colección</button>
            </div>
          </div>
        </div>
      )}

      {/* Add modal */}
      {showAdd && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowAdd(false);}}>
          <div className="modal-box">
            <button className="modal-close" onClick={()=>setShowAdd(false)}>✕</button>
            <div className="modal-title-text" style={{marginBottom:"1.4rem"}}>Nueva fragancia</div>
            <div className="sec-label" style={{marginTop:0}}>Marca</div>
            <input className="modal-input" value={addBrand} onChange={e=>setAddBrand(e.target.value)} placeholder="Ej: Dior"/>
            <div className="sec-label" style={{marginTop:0}}>Nombre</div>
            <input className="modal-input" value={addName} onChange={e=>setAddName(e.target.value)} placeholder="Ej: Sauvage Parfum"/>
            <button className="btn btn-primary" onClick={addFrag}>Añadir a la colección</button>
          </div>
        </div>
      )}
    </div>
  );
}

function CollChart({title,order,buckets,maxV,colors,type,updateCat,otherColors,otherFn}) {
  const [openCat,setOpenCat]=useState(null);
  const total=Object.values(buckets).reduce((s,b)=>s+b.length,0)||1;
  return (
    <div className="chart-card">
      <div className="chart-title">{title}</div>
      {order.map(cat=>(
        <div key={cat}>
          <div className="bar-row" style={{cursor:"pointer"}} onClick={()=>setOpenCat(openCat===cat?null:cat)}>
            <div className="bar-label">{cat}</div>
            <div className="bar-track"><div className="bar-fill" style={{width:`${buckets[cat].length/maxV*100}%`,background:colors[cat]}}/></div>
            <div className="bar-val">{buckets[cat].length} <span style={{color:"#6b7280",fontSize:".58rem"}}>({Math.round(buckets[cat].length/total*100)}%)</span> <span style={{fontSize:".6rem",color:"#6b7280"}}>{openCat===cat?"▴":"▾"}</span></div>
          </div>
          {openCat===cat && (
            <div style={{background:"#eef1f6",border:"1px solid #dde2ea",borderRadius:2,padding:".5rem .7rem",marginBottom:".4rem"}}>
              {buckets[cat].length===0
                ? <div style={{fontSize:".7rem",color:"#6b7280",fontStyle:"italic",fontFamily:"'Cormorant Garamond',serif"}}>Ninguna fragancia.</div>
                : buckets[cat].map(key=>{
                    const [brand,...rest]=key.split(" – ");
                    const other=otherFn(key);
                    return (
                      <div key={key} style={{padding:".45rem 0",borderBottom:"1px solid #dde2ea"}}>
                        <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:".3rem",flexWrap:"wrap"}}>
                          <span style={{fontSize:".55rem",letterSpacing:".12em",textTransform:"uppercase",color:"#1e3a5f",fontFamily:"'Josefin Sans',sans-serif"}}>{brand}</span>
                          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",color:"#1c1714"}}>{rest.join(" – ")}</span>
                          <span style={{marginLeft:"auto",fontSize:".55rem",padding:".12rem .45rem",borderRadius:2,background:`${otherColors[other]}20`,color:otherColors[other],border:`1px solid ${otherColors[other]}40`}}>{other}</span>
                        </div>
                        <div className="cat-btn-row">
                          {order.map(c=><button key={c} className={`cat-btn${c===cat?" active":""}`} style={c===cat?{background:colors[c],borderColor:colors[c],color:"#fff"}:{}} onClick={()=>updateCat(key,type,c)}>{c}</button>)}
                        </div>
                      </div>
                    );
                  })
              }
            </div>
          )}
        </div>
      ))}
      <div style={{marginTop:".8rem",fontSize:".65rem",color:"#6b7280",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic"}}>Pulsa barra para ver y editar</div>
    </div>
  );
}

// ── TAB: RECOMENDADOR ─────────────────────────────────────────────────────
function TabRecomendador({log, collection}) {
  const [recTab,setRecTab]=useState("diario");
  return (
    <div>
      <div className="rec-tabs">
        {[["diario","Recomendador diario"],["compra","Compra"],["venta","Venta"]].map(([id,label])=>(
          <button key={id} className={`rec-tab${recTab===id?" active":""}`} onClick={()=>setRecTab(id)}>{label}</button>
        ))}
      </div>
      {recTab==="diario" && <RecDiario log={log} collection={collection}/>}
      {recTab==="compra" && <RecIA log={log} collection={collection} mode="compra"/>}
      {recTab==="venta" && <RecIA log={log} collection={collection} mode="venta"/>}
    </div>
  );
}

function RecDiario({log,collection}) {
  const [sel,setSel]=useState({occasion:null,temp:null,time:null,style:null,recency:null});
  const [results,setResults]=useState(null);

  const questions=[
    {id:"occasion",label:"¿Cuál es la ocasión?",opts:[["casual","Casual / diario"],["trabajo","Trabajo / oficina"],["cita","Cita romántica"],["evento","Evento / gala"],["deporte","Deporte / exterior"],["noche","Salida nocturna"]]},
    {id:"temp",label:"¿Qué temperatura se prevé?",opts:[["frio","Frío (< 10 °C)"],["fresco","Fresco (10–18 °C)"],["templado","Templado (18–25 °C)"],["calor","Calor (> 25 °C)"]]},
    {id:"time",label:"¿Momento del día?",opts:[["dia","Día"],["tarde","Tarde"],["noche","Noche"]]},
    {id:"style",label:"¿Qué estilo buscas hoy?",opts:[["fresco","Fresco y limpio"],["intenso","Intenso y potente"],["sofisticado","Sofisticado y elegante"],["dulce","Dulce y cálido"],["misterioso","Oscuro y misterioso"]]},
    {id:"recency",label:"¿Cuándo lo usaste por última vez?",opts:[["cualquiera","No importa"],["noreciente","Que no sea reciente (+7 días)"],["nousado","Que no lo haya usado aún"]]},
  ];

  const lastUsedMap = {};
  log.forEach(e=>{if(!lastUsedMap[e.frag]||e.date>lastUsedMap[e.frag])lastUsedMap[e.frag]=e.date;});
  const week=new Date();week.setDate(week.getDate()-7);const weekStr=week.toISOString().split("T")[0];

  const recommend = () => {
    const scores = collection.map(p=>{
      const key=fragKey(p);const prof=FRAG_PROFILES[key];if(!prof)return{key,score:0,tags:[]};
      let score=0;
      if(sel.occasion&&prof.occ.includes(sel.occasion))score+=3;
      if(sel.temp&&prof.temp.includes(sel.temp))score+=2;
      if(sel.time&&prof.time.includes(sel.time))score+=2;
      if(sel.style&&prof.style.includes(sel.style))score+=3;
      const last=lastUsedMap[key];
      if(sel.recency==="noreciente"&&last&&last>=weekStr)score=-1;
      if(sel.recency==="nousado"&&last)score=-1;
      if(!last)score+=.5;else if(last<weekStr)score+=.3;
      return{key,score,tags:prof.tags};
    });
    setResults(scores.filter(s=>s.score>0).sort((a,b)=>b.score-a.score).slice(0,5));
  };

  const REC_REASONS={
    occasion:{casual:"ideal para el día a día",trabajo:"apropiado para el trabajo",cita:"seductor para una cita",evento:"a la altura del evento",deporte:"fresco para actividad física",noche:"perfecto para salir de noche"},
    temp:{frio:"proyecta bien en frío",fresco:"excelente en fresco",templado:"versátil en templado",calor:"aguanta bien el calor"},
    style:{fresco:"fresco y limpio",intenso:"gran proyección",sofisticado:"elegante y sofisticado",dulce:"cálido y envolvente",misterioso:"oscuro y cautivador"},
  };

  if (results) return (
    <div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.4rem",fontStyle:"italic",color:"#1c1714",marginBottom:"1.2rem"}}>Tu selección de hoy</div>
      {results.length===0&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",color:"#6b7280"}}>Sin coincidencias. Prueba a cambiar los parámetros.</div>}
      {results.map(({key,tags},i)=>{
        const [brand,...rest]=key.split(" – ");
        const reasons=[sel.occasion?REC_REASONS.occasion[sel.occasion]:null,sel.temp?REC_REASONS.temp[sel.temp]:null,sel.style?REC_REASONS.style[sel.style]:null].filter(Boolean);
        const last=lastUsedMap[key];
        return (
          <div key={key} className="rec-card">
            <div className="rec-card-num">{i+1}</div>
            <div>
              <div className="rec-card-brand">{brand}</div>
              <div className="rec-card-name">{rest.join(" – ")}</div>
              <div className="rec-card-reason">{reasons.join(" · ")} · {last?`Último: ${fmtDate(last)}`:"Sin estrenar"}</div>
              <div>{tags.map(t=><span key={t} className="rec-tag">{t}</span>)}</div>
            </div>
          </div>
        );
      })}
      <button className="btn btn-secondary" style={{marginTop:".8rem"}} onClick={()=>setResults(null)}>← Cambiar parámetros</button>
    </div>
  );

  return (
    <div>
      <div className="rec-intro">Responde las preguntas y te sugiero los perfumes más adecuados.</div>
      {questions.map(q=>(
        <div key={q.id} style={{marginBottom:"1.2rem"}}>
          <div className="rec-q-label">{q.label}</div>
          <div className="rec-opts">
            {q.opts.map(([val,label])=><button key={val} className={`rec-opt${sel[q.id]===val?" sel":""}`} onClick={()=>setSel(s=>({...s,[q.id]:val}))}>{label}</button>)}
          </div>
        </div>
      ))}
      <button className="btn btn-primary" onClick={recommend}>Ver recomendación →</button>
    </div>
  );
}

function RecIA({log,collection,mode}) {
  const [aiMode,setAiMode]=useState("general");
  const [specific,setSpecific]=useState("");
  const [result,setResult]=useState(null);

  const isCompra=mode==="compra";

  const fragCount={};log.forEach(e=>{fragCount[e.frag]=(fragCount[e.frag]||0)+1;});
  const lastUsed={};log.forEach(e=>{if(!lastUsed[e.frag]||e.date>lastUsed[e.frag])lastUsed[e.frag]=e.date;});
  const famCount={};log.forEach(e=>{const f=FAMILY_MAP[e.frag]||"Otra";famCount[f]=(famCount[f]||0)+1;});
  const totalUses=log.length||1;

  // Family distribution in collection
  const collFamCount={};
  collection.forEach(p=>{const k=fragKey(p);const f=FAMILY_MAP[k]||"Otra";collFamCount[f]=(collFamCount[f]||0)+1;});

  // Most used family by usage %
  const topFamByUse=Object.entries(famCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||"Amaderada";
  // Least represented family in collection
  const allFams=["Acuática","Amaderada","Aromática","Cítrica","Oriental","Floral","Cuero"];
  const missingFams=allFams.filter(f=>!collFamCount[f]||(collFamCount[f]<2&&(famCount[f]||0)/totalUses>0.05));

  const analyze = () => {
    if (isCompra) {
      if (aiMode==="general") {
        setResult(analyzeCompraGeneral(collection, log, fragCount, lastUsed, famCount, collFamCount, topFamByUse, missingFams, totalUses));
      } else {
        if (!specific.trim()) return;
        setResult(analyzeCompraEspecifico(specific.trim(), collection, log, fragCount, collFamCount, topFamByUse));
      }
    } else {
      if (aiMode==="general") {
        setResult(analyzeVentaGeneral(collection, log, fragCount, lastUsed, collFamCount));
      } else {
        if (!specific.trim()) return;
        setResult(analyzeVentaEspecifico(specific.trim(), collection, log, fragCount, lastUsed));
      }
    }
  };

  return (
    <div>
      <div className="rec-intro">
        {isCompra?"Analizo tu colección y te ayudo a decidir tu próxima compra.":"Analizo tu colección y te ayudo a decidir qué perfumes podrían salir."}
      </div>
      <div className="ai-mode-select">
        <button className={`ai-mode-btn${aiMode==="general"?" active":""}`} onClick={()=>{setAiMode("general");setResult(null);}}>
          {isCompra?"¿Qué me recomiendas añadir?":"¿Qué me recomiendas vender?"}
        </button>
        <button className={`ai-mode-btn${aiMode==="especifico"?" active":""}`} onClick={()=>{setAiMode("especifico");setResult(null);}}>
          {isCompra?"Evalúa un perfume concreto":"Evalúa vender un perfume"}
        </button>
      </div>

      {!result && (
        <>
          {aiMode==="especifico" && (
            <>
              <div className="rec-q-label">{isCompra?"¿Qué perfume te planteas comprar?":"¿Qué perfume te planteas vender?"}</div>
              <input className="ai-input" value={specific} onChange={e=>setSpecific(e.target.value)}
                placeholder={isCompra?"Ej: Dior Sauvage Parfum, Creed Viking...":"Escribe el nombre exacto de la fragancia..."}
                style={{marginBottom:"1rem"}}/>
            </>
          )}
          <button className="btn btn-primary" onClick={analyze}>Analizar →</button>
        </>
      )}

      {result && (
        <>
          <div className="ai-result" dangerouslySetInnerHTML={{__html:result}}/>
          <button className="btn btn-secondary" style={{marginTop:".8rem"}} onClick={()=>setResult(null)}>← Nueva consulta</button>
        </>
      )}
    </div>
  );
}

// ── TAB: COMPARADOR ───────────────────────────────────────────────────────
function TabComparador({log, collection, fichas, cats, sensaciones, getSeason, getOccasion}) {
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState([]); // max 3 keys

  const lastUsedMap = {};
  log.forEach(e=>{if(!lastUsedMap[e.frag]||e.date>lastUsedMap[e.frag])lastUsedMap[e.frag]=e.date;});
  const usageCount = (key) => log.filter(e=>e.frag===key).length;

  const filtered = search
    ? collection.filter(p=>(p.brand+" "+p.name).toLowerCase().includes(search.toLowerCase()))
    : collection;

  const toggle = (key) => {
    if (selected.includes(key)) setSelected(s=>s.filter(k=>k!==key));
    else if (selected.length < 3) setSelected(s=>[...s,key]);
  };

  // Sensaciones summary for a key
  const sensSummary = (key) => {
    const entries = log.filter(e=>e.frag===key&&sensaciones[e.id]);
    if (entries.length===0) return null;
    const proys = entries.map(e=>sensaciones[e.id].proyeccion).filter(Boolean);
    const durs  = entries.map(e=>sensaciones[e.id].duracion).filter(Boolean);
    const notes = entries.map(e=>sensaciones[e.id].nota).filter(Boolean);
    const lastNote = notes[notes.length-1];
    return {
      proyeccion: proys.length ? proys[proys.length-1] : null,
      duracion:   durs.length  ? durs[durs.length-1]   : null,
      lastNote,
      count: entries.length,
    };
  };

  const ROW_LABELS = ["Marca","Familia","Estación","Ocasión","Usos totales","Último uso","Proyección","Duración","Notas","Fragrantica"];

  const getCellVal = (key, row) => {
    const [brand,...rest] = key.split(" – ");
    const name = rest.join(" – ");
    const cnt = usageCount(key);
    const last = lastUsedMap[key];
    const s = sensSummary(key);
    const f = fichas[key]||{};
    switch(row) {
      case "Marca":      return brand;
      case "Familia":    return FAMILY_MAP[key] || "—";
      case "Estación":   return getSeason(key);
      case "Ocasión":    return getOccasion(key);
      case "Usos totales": return cnt > 0 ? `${cnt} uso${cnt!==1?"s":""}` : "Sin estrenar";
      case "Último uso": return last ? fmtDate(last) : "—";
      case "Proyección": return s?.proyeccion || "—";
      case "Duración":   return s?.duracion   || "—";
      case "Notas":      return s?.lastNote   || f.notes?.slice(0,60)||(f.notes?"...":"—");
      case "Fragrantica":return f.link ? "Ver →" : "—";
      default: return "—";
    }
  };

  const getLink = (key) => fichas[key]?.link || null;

  const colW = selected.length === 1 ? "60%" : selected.length === 2 ? "45%" : "32%";

  return (
    <div>
      <div className="rec-intro">Selecciona hasta 3 fragancias para comparar lado a lado.</div>

      {/* Selected chips */}
      {selected.length > 0 && (
        <div style={{display:"flex",gap:".4rem",flexWrap:"wrap",marginBottom:"1rem"}}>
          {selected.map(key=>{
            const [brand,...rest]=key.split(" – ");
            return (
              <div key={key} style={{display:"inline-flex",alignItems:"center",gap:".4rem",background:"#dbeafe",border:"1px solid #1e3a5f",borderRadius:2,padding:".3rem .7rem"}}>
                <span style={{fontSize:".62rem",color:"#1e3a5f"}}>{brand} – {rest.join(" – ")}</span>
                <button onClick={()=>toggle(key)} style={{background:"none",border:"none",color:"#1e3a5f",cursor:"pointer",fontSize:".8rem",lineHeight:1,padding:0}}>✕</button>
              </div>
            );
          })}
        </div>
      )}

      {/* Comparison table */}
      {selected.length >= 2 && (
        <div style={{overflowX:"auto",marginBottom:"1.8rem"}}>
          <table style={{width:"100%",borderCollapse:"collapse",background:"#fff",border:"1px solid #dde2ea",borderRadius:3}}>
            <thead>
              <tr>
                <th style={{padding:".6rem .8rem",textAlign:"left",fontSize:".58rem",letterSpacing:".15em",textTransform:"uppercase",color:"#6b7280",borderBottom:"2px solid #dde2ea",width:"20%"}}>Característica</th>
                {selected.map(key=>{
                  const [brand,...rest]=key.split(" – ");
                  return (
                    <th key={key} style={{padding:".6rem .8rem",textAlign:"left",borderBottom:"2px solid #1e3a5f",width:colW}}>
                      <div style={{fontSize:".55rem",letterSpacing:".14em",textTransform:"uppercase",color:"#1e3a5f",marginBottom:".15rem"}}>{brand}</div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"#1c1714"}}>{rest.join(" – ")}</div>
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {ROW_LABELS.map((row,i)=>(
                <tr key={row} style={{background:i%2===0?"#faf8f5":"#fff"}}>
                  <td style={{padding:".55rem .8rem",fontSize:".62rem",letterSpacing:".1em",textTransform:"uppercase",color:"#6b7280",borderBottom:"1px solid #dde2ea",fontWeight:400}}>{row}</td>
                  {selected.map(key=>{
                    const val = getCellVal(key, row);
                    const link = row==="Fragrantica" ? getLink(key) : null;
                    return (
                      <td key={key} style={{padding:".55rem .8rem",fontSize:".82rem",color:"#1c1714",borderBottom:"1px solid #dde2ea",fontFamily:["Marca","Notas"].includes(row)?"'Cormorant Garamond',serif":"inherit"}}>
                        {link ? <a href={link} target="_blank" rel="noopener" style={{color:"#1e3a5f",textDecoration:"none",fontSize:".7rem",letterSpacing:".1em"}}>Abrir →</a> : val}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {selected.length < 2 && selected.length > 0 && (
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",color:"#6b7280",marginBottom:"1.2rem"}}>
          Selecciona al menos una fragancia más para comparar.
        </div>
      )}

      {/* Search & pick */}
      <div className="sec-label" style={{marginTop:0}}>
        {selected.length < 3 ? `Añadir fragancia ${selected.length > 0 ? `(${3-selected.length} restante${3-selected.length!==1?"s":""})` : ""}` : "Máximo 3 seleccionadas"}
      </div>
      {selected.length < 3 && (
        <>
          <div className="search-wrap">
            <span className="search-icon">◈</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Busca una fragancia..."/>
          </div>
          <div className="perf-grid">
            {filtered.filter(p=>!selected.includes(fragKey(p))).map(p=>{
              const key=fragKey(p);
              const cnt=usageCount(key);
              return (
                <div key={key} className="perf-item" onClick={()=>toggle(key)}>
                  <div className="perf-brand">{p.brand}</div>
                  <div className="perf-name">{p.name}</div>
                  {cnt>0&&<div style={{fontSize:".58rem",color:"#6b7280",marginTop:".2rem"}}>{cnt} usos</div>}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}
